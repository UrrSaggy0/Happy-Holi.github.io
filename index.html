<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background: linear-gradient(-45deg,#ff0080,#ff8c00,#40e0d0,#ff1493);
    background-size:400% 400%;
    animation:gradientMove 8s infinite alternate;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

@keyframes gradientMove{
    0%{background-position:left;}
    100%{background-position:right;}
}

/* Floating particles */
.particle{
    position:fixed;
    width:8px;
    height:8px;
    border-radius:50%;
    opacity:0.7;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* Premium Glass Card */
.container{
    position:relative;
    padding:40px;
    width:90%;
    max-width:600px;
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border-radius:25px;
    box-shadow:0 0 50px rgba(0,0,0,0.4);
}

h1{
    font-size:2.5rem;
    text-shadow:0 0 20px yellow;
}

input{
    padding:12px;
    border-radius:30px;
    border:none;
    width:80%;
    margin-top:20px;
    text-align:center;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.generate{background:#ffcc00;}
.music{background:#00ffff;}

#wishOutput{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

/* Confetti */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
    }
}

@media(max-width:768px){
    h1{font-size:2rem;}
}
</style>
</head>

<body>

<div class="container">
    <h1>🌈 Happy Holi 2026 🌈</h1>

    <input type="text" id="nameInput" placeholder="Enter Your Name">

    <br>
    <button class="generate" onclick="generateWish()">Generate Wish 💌</button>
    <button class="music" onclick="nextSong()">Change Song 🎵</button>

    <div id="wishOutput"></div>
</div>

<!-- Hidden YouTube Player -->
<iframe id="ytplayer" width="0" height="0"
frameborder="0"
allow="autoplay">
</iframe>

<script>
/* Hindi Holi Songs Playlist */
let songs = [
"https://youtu.be/ILHtVYzQKsg?si=Um1WhUYU1RbF46Xk",  // Rang Barse
"https://youtu.be/05WCGAWvsKM?si=m36qrsuslkxVN9Hy",  // Balam Pichkari
];

let currentSong = 0;
let player = document.getElementById("ytplayer");

/* Auto Play First Song */
window.onload = function(){
    player.src = songs[0] + "?autoplay=1";
}

function nextSong(){
    currentSong = (currentSong + 1) % songs.length;
    player.src = songs[currentSong] + "?autoplay=1";
}

/* Wish Generator */
function generateWish(){
    let name=document.getElementById("nameInput").value;
    let output=document.getElementById("wishOutput");

    if(name===""){
        output.innerHTML="Please enter your name!";
        return;
    }

    output.innerHTML="🎉 Happy Holi "+name+"! May your life be filled with vibrant colors of joy and success! 🌸";

    launchConfetti();
}

/* Confetti Effect */
function launchConfetti(){
    for(let i=0;i<100;i++){
        let confetti=document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left=Math.random()*100+"vw";
        confetti.style.background=getRandomColor();
        confetti.style.animationDuration=(Math.random()*2+2)+"s";
        document.body.appendChild(confetti);
        setTimeout(()=>confetti.remove(),3000);
    }
}

/* Floating Background Particles */
for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.classList.add("particle");
    p.style.left=Math.random()*100+"vw";
    p.style.background=getRandomColor();
    p.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(p);
}

function getRandomColor(){
    let colors=["red","yellow","blue","green","pink","orange","purple","cyan"];
    return colors[Math.floor(Math.random()*colors.length)];
}
</script>

</body>
</html>
